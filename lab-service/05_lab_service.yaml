openapi: 3.0.3
info:
  title: HMS — Lab Service
  description: |
    Manages the laboratory: test catalog, patient registration for tests, result entry, 
    report PDF uploads, and payment recording.
    
    Lab orders can be created in two ways:
    1. **From clinical session** — doctor publishes `lab.requested` event → Lab Service auto-creates order
    2. **Walk-in** — Lab Technician manually creates order via `POST /orders`
    
    **Auth:** Keycloak JWT required.
    
    **Base URL (via gateway):** `http://localhost:3000/lab`
    **Direct URL:** `http://localhost:3005`
    
    **NATS events consumed:**
    - `lab.requested` → auto-creates a lab order from a clinical session request
    
    **NATS events published:**
    - `billing.lab` → on `PUT /orders/:id/pay` → Finance Service records payment
  version: 1.0.0

servers:
  - url: http://localhost:3000/lab
    description: Via API Gateway
  - url: http://localhost:3005
    description: Direct (internal)

tags:
  - name: Tests
    description: Lab test catalog management
  - name: Orders
    description: Lab order management — creation, results, reports, payment
  - name: History
    description: Patient lab history

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Test:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Complete Blood Count"
        code:
          type: string
          example: "CBC"
        category:
          type: string
          example: "Haematology"
          nullable: true
        unit_price:
          type: number
          format: float
          example: 750.00
        turnaround_hours:
          type: integer
          example: 4
          nullable: true
        reference_range:
          type: string
          example: "WBC: 4.5-11.0 x10³/μL, RBC: 4.5-5.5 x10⁶/μL"
          nullable: true
        is_active:
          type: boolean
          default: true

    TestCreate:
      type: object
      required: [name, code, unit_price]
      properties:
        name:
          type: string
          example: "Widal Test"
        code:
          type: string
          example: "WIDAL"
          description: Short unique code used internally
        category:
          type: string
          example: "Microbiology"
        unit_price:
          type: number
          format: float
          example: 500.00
        turnaround_hours:
          type: integer
          example: 24
        reference_range:
          type: string
          example: "Negative < 1:80"

    OrderTest:
      type: object
      description: A single test within an order
      properties:
        id:
          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
        test_id:
          type: string
          format: uuid
        test_name:
          type: string
          example: "Complete Blood Count"
        test_code:
          type: string
          example: "CBC"
        urgency:
          type: string
          enum: [routine, urgent]
        unit_price:
          type: number
          format: float
        result_value:
          type: string
          nullable: true
          example: "WBC: 9.2, RBC: 4.8, Hgb: 13.5"
        is_abnormal:
          type: boolean
          nullable: true
        technician_notes:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, completed]

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        patient_id:
          type: string
          format: uuid
          nullable: true
        patient_name:
          type: string
          example: "Andrea Lalema"
        patient_mobile:
          type: string
          example: "+94771234567"
          nullable: true
        session_id:
          type: string
          format: uuid
          nullable: true
          description: Set when order was created from a clinical session event
        source:
          type: string
          enum: [walk_in, clinical_request]
        tests:
          type: array
          items:
            $ref: '#/components/schemas/OrderTest'
        total_amount:
          type: number
          format: float
          example: 1750.00
        status:
          type: string
          enum: [registered, processing, completed, cancelled]
        payment_status:
          type: string
          enum: [pending, paid]
        report_file_url:
          type: string
          nullable: true
          description: Pre-signed MinIO URL for the report PDF (15-min TTL)
        report_notes:
          type: string
          nullable: true
        created_by:
          type: string
          description: Lab technician name who registered the order
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    OrderCreate:
      type: object
      required: [tests]
      properties:
        patient_id:
          type: string
          format: uuid
          description: Use if patient is registered. Otherwise provide patient_name + patient_mobile.
        patient_name:
          type: string
          description: Required if patient_id is null
          example: "Andrea Lalema"
        patient_mobile:
          type: string
          description: Required if patient_id is null
          example: "+94771234567"
        session_id:
          type: string
          format: uuid
          description: Link to clinical session (only for clinical_request source)
        source:
          type: string
          enum: [walk_in, clinical_request]
          default: walk_in
        tests:
          type: array
          minItems: 1
          items:
            type: object
            required: [test_id]
            properties:
              test_id:
                type: string
                format: uuid
              urgency:
                type: string
                enum: [routine, urgent]
                default: routine
        notes:
          type: string
          description: Instructions for the technician

    ResultsUpdate:
      type: object
      required: [results]
      properties:
        results:
          type: array
          minItems: 1
          items:
            type: object
            required: [order_test_id, result_value]
            properties:
              order_test_id:
                type: string
                format: uuid
              result_value:
                type: string
                example: "9.2 x10³/μL"
              is_abnormal:
                type: boolean
                example: false
              technician_notes:
                type: string

    PaymentRecord:
      type: object
      required: [payment_method, amount_paid]
      properties:
        payment_method:
          type: string
          enum: [cash, card, online, insurance]
        amount_paid:
          type: number
          format: float

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            statusCode:
              type: integer

security:
  - bearerAuth: []

paths:

  # ─── TESTS ───────────────────────────────────────────────────

  /tests:
    get:
      tags: [Tests]
      summary: Get test catalog
      description: Full list of available lab tests with prices. Used when booking tests or building order forms.
      parameters:
        - name: category
          in: query
          schema:
            type: string
          example: "Haematology"
        - name: search
          in: query
          schema:
            type: string
          description: Search by name or code
        - name: is_active
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Test catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Test'
      security:
        - bearerAuth: []

    post:
      tags: [Tests]
      summary: Add test to catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestCreate'
            example:
              name: "Widal Test"
              code: "WIDAL"
              category: "Microbiology"
              unit_price: 500.00
              turnaround_hours: 24
              reference_range: "Negative < 1:80 titre"
      responses:
        "201":
          description: Test added to catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Test'
        "409":
          description: Test code already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /tests/{id}:
    put:
      tags: [Tests]
      summary: Update test details or price
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                category:
                  type: string
                unit_price:
                  type: number
                  format: float
                turnaround_hours:
                  type: integer
                reference_range:
                  type: string
                is_active:
                  type: boolean
      responses:
        "200":
          description: Test updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Test'
        "404":
          description: Test not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

    delete:
      tags: [Tests]
      summary: Remove test from catalog
      description: Soft-delete — sets is_active to false. Cannot hard-delete if orders exist.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Test deactivated
        "422":
          description: Cannot delete — orders exist for this test
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  # ─── ORDERS ──────────────────────────────────────────────────

  /orders:
    post:
      tags: [Orders]
      summary: Register a lab order (walk-in)
      description: |
        Creates a lab order for a patient. Computes total from test catalog prices.
        
        For **clinical session requests**, orders are created automatically when the Lab Service 
        consumes the `lab.requested` NATS event. You only need this endpoint for walk-in patients.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
            example:
              patient_name: "Andrea Lalema"
              patient_mobile: "+94771234567"
              source: "walk_in"
              tests:
                - test_id: "uuid-cbc"
                  urgency: "routine"
                - test_id: "uuid-widal"
                  urgency: "urgent"
              notes: "Patient reports 4 days of fever"
      responses:
        "201":
          description: Order registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Order'
              example:
                success: true
                data:
                  id: "uuid-order"
                  patient_name: "Andrea Lalema"
                  source: "walk_in"
                  status: "registered"
                  payment_status: "pending"
                  total_amount: 1250.00
                  tests:
                    - test_name: "Complete Blood Count"
                      urgency: "routine"
                      status: "pending"
                    - test_name: "Widal Test"
                      urgency: "urgent"
                      status: "pending"
        "400":
          description: Invalid test IDs or missing required patient info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

    get:
      tags: [Orders]
      summary: List lab orders
      description: Paginated list of orders. Lab tech sees all. Doctor sees orders linked to their sessions only.
      parameters:
        - name: patient_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [registered, processing, completed, cancelled]
        - name: payment_status
          in: query
          schema:
            type: string
            enum: [pending, paid]
        - name: source
          in: query
          schema:
            type: string
            enum: [walk_in, clinical_request]
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Filter by creation date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
      security:
        - bearerAuth: []

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get order by ID
      description: Full order detail with all tests and their results.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Order'
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /orders/{id}/results:
    put:
      tags: [Orders]
      summary: Enter test results
      description: |
        Lab technician enters results for one or more tests in the order.
        Can be called multiple times — each call updates the specified order_test entries.
        Order status automatically becomes `processing` on first result entry,
        and `completed` when all tests have results.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResultsUpdate'
            example:
              results:
                - order_test_id: "uuid-order-test-1"
                  result_value: "WBC: 9.2 x10³/μL, RBC: 4.8 x10⁶/μL, Hgb: 13.5 g/dL"
                  is_abnormal: false
                  technician_notes: "Normal range"
                - order_test_id: "uuid-order-test-2"
                  result_value: "S.Typhi O: 1:160, S.Typhi H: 1:320"
                  is_abnormal: true
                  technician_notes: "Significant titre — suggest clinical correlation"
      responses:
        "200":
          description: Results recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Order'
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "422":
          description: Order is cancelled or already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /orders/{id}/report:
    post:
      tags: [Orders]
      summary: Upload packaged report PDF
      description: |
        Lab technician uploads the final report PDF for the order.
        File is stored in MinIO under `hms-lab-reports/`.
        Order status is set to `completed` after upload.
        Returns a pre-signed URL for download (15-min TTL).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [report]
              properties:
                report:
                  type: string
                  format: binary
                  description: PDF file. Max 20MB.
                notes:
                  type: string
                  description: Lab notes or remarks for the doctor
                  example: "Results suggest typhoid. Recommend treatment."
      responses:
        "200":
          description: Report uploaded and order marked completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      order_id:
                        type: string
                        format: uuid
                      report_url:
                        type: string
                        description: Pre-signed download URL (15-min TTL)
                        example: "http://localhost:9000/hms-lab-reports/report-uuid.pdf?X-Amz-..."
                      expires_at:
                        type: string
                        format: date-time
                      status:
                        type: string
                        example: "completed"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /orders/{id}/pay:
    put:
      tags: [Orders]
      summary: Record lab order payment
      description: |
        Records payment for a lab order. After recording, publishes `billing.lab` event
        to NATS so Finance Service can log the payment in its records.
        
        **NATS event published:**
        ```
        Exchange: billing.events
        Routing key: billing.lab
        Payload: { order_id, patient_id, patient_name, tests, total_amount, payment_method, paid_at }
        ```
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRecord'
            example:
              payment_method: "cash"
              amount_paid: 1250.00
      responses:
        "200":
          description: Payment recorded and billing event published
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Order'
                  message:
                    type: string
                    example: "Payment recorded. Finance service notified."
        "422":
          description: Order already paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  # ─── HISTORY ─────────────────────────────────────────────────

  /patients/{patientId}/history:
    get:
      tags: [History]
      summary: Get patient lab history
      description: All lab orders and results for a patient across all visits. Used in Doctor and Patient dashboards.
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Patient lab history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      patient_id:
                        type: string
                        format: uuid
                      orders:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      total:
                        type: integer
      security:
        - bearerAuth: []
