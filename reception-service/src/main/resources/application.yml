server:
  port: 3001

spring:
  application:
    name: reception-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:hms_db}
    username: ${DB_USER:hms_user}
    password: ${DB_PASS:hms_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        "[format_sql]": true
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

nats:
  url: ${NATS_URL:nats://localhost:4222}

minio:
  url: ${MINIO_URL:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  buckets:
    avatars: hms-avatars

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE
