<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMS — OpenAPI Specs</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--bg2:#0d1117;--bg3:#141a23;--bg4:#1a2332;
  --border:rgba(148,163,184,.1);--border2:rgba(148,163,184,.18);
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  --get:#3b82f6;--post:#10b981;--put:#f59e0b;--delete:#ef4444;--patch:#8b5cf6;
  --get-bg:rgba(59,130,246,.1);--post-bg:rgba(16,185,129,.1);
  --put-bg:rgba(245,158,11,.1);--delete-bg:rgba(239,68,68,.1);--patch-bg:rgba(139,92,246,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"Syne",sans-serif;display:flex;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(148,163,184,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* SIDEBAR */
.sidebar{width:260px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border2);height:100vh;position:sticky;top:0;overflow-y:auto;z-index:10;display:flex;flex-direction:column}
.sidebar-hdr{padding:20px 16px 14px;border-bottom:1px solid var(--border)}
.sidebar-hdr h2{font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;background:linear-gradient(90deg,#93c5fd,#67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-hdr p{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted);margin-top:4px}
.sidebar-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.sidebar-search input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:6px 10px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--text);outline:none}
.sidebar-search input:focus{border-color:rgba(59,130,246,.5)}
.sidebar-search input::placeholder{color:var(--muted)}
.svc-nav{padding:8px 0}
.svc-nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.svc-nav-item:hover{background:rgba(255,255,255,.03);border-left-color:rgba(255,255,255,.1)}
.svc-nav-item.active{background:rgba(255,255,255,.05);border-left-color:var(--svc-color)}
.svc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.svc-nav-label{font-size:12px;font-weight:600;flex:1}
.svc-nav-port{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted);background:rgba(0,0,0,.3);padding:1px 5px;border-radius:2px}
.tag-nav{margin-left:16px;border-left:1px solid var(--border);padding-left:0}
.tag-nav-item{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 12px;cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);transition:all .15s;border-radius:0 4px 4px 0}
.tag-nav-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tag-nav-item.active-tag{color:var(--text)}
.tag-count{margin-left:auto;font-size:9px;background:rgba(255,255,255,.08);padding:1px 5px;border-radius:10px}

/* MAIN */
.main{flex:1;overflow-y:auto;min-height:100vh;position:relative;z-index:1}
.main-hdr{padding:28px 32px 0;border-bottom:1px solid var(--border);margin-bottom:0}
.main-hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:16px;flex-wrap:wrap}
.svc-title{font-size:22px;font-weight:800;letter-spacing:-.01em}
.svc-badge{display:inline-flex;align-items:center;gap:6px;font-family:"JetBrains Mono",monospace;font-size:10px;border:1px solid;border-radius:3px;padding:3px 9px;margin-top:4px}
.svc-desc{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.5;max-width:700px}
.svc-stats{display:flex;gap:16px;padding:12px 0;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-val{font-size:20px;font-weight:800}
.stat-lbl{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* CONTENT */
.content{padding:0 32px 60px}

/* TAG GROUP */
.tag-group{margin-top:28px}
.tag-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.tag-hdr h3{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted2)}
.tag-hdr-count{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted);background:rgba(255,255,255,.06);padding:2px 7px;border-radius:10px}

/* ENDPOINT CARD */
.ep-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.ep-card:hover{border-color:var(--border2)}
.ep-card.open{border-color:var(--ep-color,rgba(59,130,246,.4))}
.ep-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.method-badge{font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;min-width:56px;text-align:center;flex-shrink:0}
.ep-path{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted2);flex:1;word-break:break-all}
.ep-summary{font-size:11px;color:var(--muted);flex:1;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ep-chevron{color:var(--muted);font-size:12px;transition:transform .2s;flex-shrink:0}
.ep-card.open .ep-chevron{transform:rotate(180deg)}

/* ENDPOINT BODY */
.ep-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.ep-card.open .ep-body{display:block}
.ep-desc{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted2);line-height:1.65;margin:12px 0;white-space:pre-wrap}
.section-lbl{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:12px 0 6px;display:flex;align-items:center;gap:8px}
.section-lbl::after{content:"";flex:1;height:1px;background:var(--border)}

/* PARAMS TABLE */
.params-table{width:100%;border-collapse:collapse;font-family:"JetBrains Mono",monospace;font-size:10px}
.params-table th{text-align:left;padding:5px 8px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:9px;text-transform:uppercase;letter-spacing:.08em}
.params-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top}
.params-table tr:last-child td{border-bottom:none}
.param-name{color:#93c5fd}
.param-type{color:var(--muted);font-size:9px}
.param-req{color:#f59e0b;font-size:9px}
.param-opt{color:var(--muted);font-size:9px}
.param-desc{color:var(--muted2);font-size:9px;line-height:1.4}
.param-enum{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.enum-val{font-size:8px;padding:1px 5px;border-radius:2px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted)}

/* RESPONSES */
.response-row{display:flex;align-items:flex-start;gap:10px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.response-row:last-child{border-bottom:none}
.resp-code{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:600;min-width:36px}
.resp-desc{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted2)}
.code-2xx{color:#10b981}
.code-4xx{color:#f59e0b}
.code-5xx{color:#ef4444}

/* FIELDS TABLE */
.fields-table{width:100%;border-collapse:collapse;font-family:"JetBrains Mono",monospace;font-size:10px}
.fields-table th{text-align:left;padding:5px 8px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:9px;text-transform:uppercase;letter-spacing:.08em;background:rgba(255,255,255,.02)}
.fields-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top}
.fields-table tr:last-child td{border-bottom:none}
.field-required{color:#f59e0b;font-size:9px;font-weight:600}
.field-optional{color:var(--muted);font-size:9px}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:11px}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(148,163,184,.2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,.35)}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-hdr">
    <h2>HMS API Specs</h2>
    <p>6 microservices · 85 endpoints</p>
  </div>
  <div class="sidebar-search">
    <input type="text" id="search" placeholder="Search endpoints…" oninput="filterEndpoints(this.value)">
  </div>
  <div class="svc-nav" id="svc-nav"></div>
</nav>

<div class="main" id="main">
  <div class="main-hdr" id="main-hdr"></div>
  <div class="content" id="content"></div>
</div>

<script>
const SPECS = [{"label":"Gateway","color":"#6366f1","port":"3000","description":"Single entry point for all HMS client requests. Handles rate limiting (100 req/min), JWT validation via Keycloak JWKS (RS256), and RBAC enforcement. Injects X-User-Id, X-User-Role, X-User-Name headers before proxying to upstream services.","tags":["Auth","Health","Admin — RBAC Rules"],"endpoints":[{"method":"POST","path":"/realms/hms/protocol/openid-connect/token","summary":"Get access token (Keycloak)","description":"Login with username + password to receive a Keycloak JWT.\n\nCall this on port 8080 DIRECTLY — NOT through the gateway (port 3000).\n\nUse the returned access_token in Authorization: Bearer <token> for all gateway requests. Tokens expire after 5 minutes (300 s).\n\nSeed accounts (password: Password@123):\n  admin → admin role\n  dr.smith → doctor role\n  nurse.silva → nurse role\n  reception1 → receptionist role\n  labtech1 → lab_tech role\n  ward.staff1 → ward_staff role","tag":"Auth","request_body":{"content_type":"application/x-www-form-urlencoded"},"query_params":[],"path_params":[],"responses":[{"code":"200","description":"Token issued — use access_token in Authorization header"},{"code":"401","description":"Invalid credentials"}]},{"method":"GET","path":"/health","summary":"Gateway health check","description":"Public endpoint — no token required. Returns gateway status and service name.","tag":"Health","request_body":null,"query_params":[],"path_params":[],"responses":[{"code":"200","description":"Gateway is running — { success: true, data: { status: 'ok', service: 'hms-gateway' } }"}]},{"method":"GET","path":"/admin/routes","summary":"List all RBAC rules","description":"Returns the current in-memory rule list with zero-based indices. Rules are matched top-to-bottom — first match wins. Requires admin JWT + X-Admin-Key: admin-secret-key header.","tag":"Admin — RBAC Rules","request_body":null,"query_params":[],"path_params":[],"responses":[{"code":"200","description":"Array of RouteRule objects with index, pattern, allowedRoles"},{"code":"401","description":"Missing or invalid token"},{"code":"403","description":"Role is not admin or missing X-Admin-Key"}]},{"method":"POST","path":"/admin/routes","summary":"Add (or replace) a RBAC rule","description":"Adds a new rule at the requested position. If a rule with the same pattern already exists it is removed first, then the new rule is inserted at position.\n\nOmit position (or set to -1) to append at the end. Changes take effect immediately — no restart required.\n\nBody: { pattern: string, allowedRoles: string[], position?: number }","tag":"Admin — RBAC Rules","request_body":{"content_type":"application/json"},"query_params":[],"path_params":[],"responses":[{"code":"200","description":"Rule added — returns updated rule list"},{"code":"400","description":"Missing pattern or empty allowedRoles"},{"code":"401","description":"Missing or invalid token"},{"code":"403","description":"Role is not admin or missing X-Admin-Key"}]},{"method":"PUT","path":"/admin/routes/{index}","summary":"Update roles for an existing rule","description":"Replaces the allowedRoles for the rule at the given index. Run GET /admin/routes first to find the correct index.\n\nTo change the pattern or reorder a rule, delete it and re-add it. Changes take effect immediately.\n\nBody: { allowedRoles: string[] }","tag":"Admin — RBAC Rules","request_body":{"content_type":"application/json"},"query_params":[],"path_params":[{"name":"index","description":"Zero-based index of the rule (from GET /admin/routes)","type":"integer"}],"responses":[{"code":"200","description":"Rule updated — returns updated rule list"},{"code":"400","description":"Empty allowedRoles"},{"code":"401","description":"Missing or invalid token"},{"code":"403","description":"Role is not admin or missing X-Admin-Key"},{"code":"404","description":"Index out of range"}]},{"method":"DELETE","path":"/admin/routes/{index}","summary":"Delete a RBAC rule","description":"Removes the rule at the given index. All subsequent rules shift down by one. Run GET /admin/routes first to confirm the correct index before deleting. Changes take effect immediately.","tag":"Admin — RBAC Rules","request_body":null,"query_params":[],"path_params":[{"name":"index","description":"Zero-based index of the rule to remove","type":"integer"}],"responses":[{"code":"200","description":"Rule deleted — returns updated rule list"},{"code":"401","description":"Missing or invalid token"},{"code":"403","description":"Role is not admin or missing X-Admin-Key"},{"code":"404","description":"Index out of range"}]},{"method":"POST","path":"/admin/routes/reset","summary":"Restore built-in default rules","description":"Overwrites the current rule list with the 22 built-in default rules and persists them to Redis. Use this to undo all custom changes and return to the original configuration. Changes take effect immediately.","tag":"Admin — RBAC Rules","request_body":null,"query_params":[],"path_params":[],"responses":[{"code":"200","description":"Rules reset to defaults — returns all 22 default rules"},{"code":"401","description":"Missing or invalid token"},{"code":"403","description":"Role is not admin or missing X-Admin-Key"}]},{"method":"POST","path":"/admin/routes/reload","summary":"Reload rules from Redis","description":"Forces the in-memory rule cache to be refreshed from Redis. Useful when rules were modified by another gateway instance (horizontal scaling). In a single-instance setup, GET /admin/routes is always already in sync.","tag":"Admin — RBAC Rules","request_body":null,"query_params":[],"path_params":[],"responses":[{"code":"200","description":"Rules reloaded from Redis — returns current rule list"},{"code":"401","description":"Missing or invalid token"},{"code":"403","description":"Role is not admin or missing X-Admin-Key"},{"code":"500","description":"Redis unavailable or rules key missing"}]}]},{"label":"Reception","color":"#3b82f6","port":"3001","description":"Manages patient registration, queue token issuance, and appointment booking.","endpoints":[{"method":"GET","path":"/patients","summary":"List all patients","description":"Paginated list of all registered patients. Supports name/mobile search.","tag":"Patients","request_body":null,"query_params":[{"name":"search","required":false,"description":"Search by name or mobile number","type":"string","enum":null},{"name":"status","required":false,"description":"","type":"string","enum":["active","inactive"]},{"name":"page","required":false,"description":"","type":"integer","enum":null},{"name":"limit","required":false,"description":"","type":"integer","enum":null}],"path_params":[],"responses":[{"code":"200","description":"Paginated patient list"},{"code":"401","description":"Missing or invalid JWT"}]},{"method":"POST","path":"/patients","summary":"Register a new patient","description":"Creates a new patient record. The patient_number is auto-generated (R00001, R00002…).\nAvatar file upload is optional via multipart/form-data.","tag":"Patients","request_body":{"content_type":"multipart/form-data"},"query_params":[],"path_params":[],"responses":[{"code":"201","description":"Patient registered successfully"},{"code":"409","description":"Mobile number already registered"}]},{"method":"GET","path":"/patients/search","summary":"Search patients by name or mobile","description":"Lightweight search used for autocomplete in appointment booking and token issuance. Returns basic info only.","tag":"Patients","request_body":null,"query_params":[{"name":"q","required":true,"description":"Search term — matches against first_name, last_name, or mobile","type":"string","enum":null}],"path_params":[],"responses":[{"code":"200","description":"Matching patients"}]},{"method":"GET","path":"/patients/{id}","summary":"Get patient by ID","description":"","tag":"Patients","request_body":null,"query_params":[],"path_params":["id"],"responses":[{"code":"200","description":"Patient record"},{"code":"404","description":"Patient not found"}]},{"method":"PUT","path":"/patients/{id}","summary":"Update patient details","description":"Receptionist can update patient contact details, address, triage etc.","tag":"Patients","request_body":{"content_type":"multipart/form-data"},"query_params":[],"path_params":["id"],"responses":[{"code":"200","description":"Patient updated"},{"code":"404","description":"Patient not found"}]},{"method":"POST","path":"/tokens","summary":"Issue a queue token","description":"Issues a queue token for a patient. Token numbers reset daily per queue type.\nOn creation, publishes a `queue.updated` event to RabbitMQ, which the API Gateway\nbridges to connected Queue Display boards via WebSocket.","tag":"Tokens","request_body":{"content_type":"application/json","example":"{\n  \"patient_id\": \"a1b2c3d4-e5f6-7890-abcd-ef1234567890\",\n  \"queue_type\": \"opd\"\n}"},"query_params":[],"path_params":[],"responses":[{"code":"201","description":"Token issued"},{"code":"422","description":"Patient already has an active token for this queue today"}]},{"method":"GET","path":"/tokens/today","summary":"All tokens issued today","description":"Returns all tokens for today across all queue types with current status.","tag":"Tokens","request_body":null,"query_params":[{"name":"queue_type","required":false,"description":"","type":"string","enum":["opd","wound_care","doctor_consultation"]},{"name":"status","required":false,"description":"","type":"string","enum":["waiting","called","in_progress","completed","skipped","cancelled"]}],"path_params":[],"responses":[{"code":"200","description":"Today's tokens"}]},{"method":"PUT","path":"/tokens/{id}/status","summary":"Update token status","description":"Updates the token status. This is the primary action for the queue workflow:\n- Receptionist calls patient: waiting → called\n- Doctor starts: called → in_progress  \n- Doctor finishes: in_progress → completed\n\nEvery status change publishes a `queue.updated` RabbitMQ fanout event,\nwhich instantly refreshes all Queue Display boards via WebSocket.","tag":"Tokens","request_body":{"content_type":"application/json","example":"{\n  \"status\": \"called\"\n}"},"query_params":[],"path_params":["id"],"responses":[{"code":"200","description":"Token status updated"},{"code":"404","description":"Token not found"}]},{"method":"GET","path":"/queue/{type}","summary":"Get live queue for a type","description":"Returns all active tokens for the given queue type today, sorted by token_number.\nUsed by the Queue Display board (polls or receives via WebSocket push).\nDoctor sees only their own queue when queue_type = doctor_consultation.","tag":"Queue","request_body":null,"query_params":[{"name":"doctor_id","required":false,"description":"Filter by doctor (for doctor_consultation queue)","type":"string","enum":null}],"path_params":["type"],"responses":[{"code":"200","description":"Current queue state"}]},{"method":"GET","path":"/appointments","summary":"List appointments","description":"Returns appointments with optional filters. \n- Admin/Receptionist: sees all appointments\n- Doctor: sees only their own appointments (filtered server-side by X-User-Id)","tag":"Appointments","request_body":null,"query_params":[{"name":"doctor_id","required":false,"description":"","type":"string","enum":null},{"name":"date","required":false,"description":"","type":"string","enum":null},{"name":"status","required":false,"description":"","type":"string","enum":["scheduled","ongoing","completed","cancelled","rescheduled"]},{"name":"patient_id","required":false,"description":"","type":"string","enum":null},{"name":"page","required":false,"description":"","type":"integer","enum":null},{"name":"limit","required":false,"description":"","type":"integer","enum":null}],"path_params":[],"responses":[{"code":"200","description":"Appointment list"}]},{"method":"POST","path":"/appointments","summary":"Book an appointment","description":"Book a new appointment. Validates that the doctor has an available slot at the given time.\nIf patient_id is provided and patient is found, their details auto-fill.","tag":"Appointments","request_body":{"content_type":"multipart/form-data"},"query_params":[],"path_params":[],"responses":[{"code":"201","description":"Appointment booked"},{"code":"422","description":"Slot not available or doctor unavailable"}]},{"method":"GET","path":"/appointments/{id}","summary":"Get appointment by ID","description":"","tag":"Appointments","request_body":null,"query_params":[],"path_params":["id"],"responses":[{"code":"200","description":"Appointment detail"},{"code":"404","description":"Appointment not found"}]},{"method":"PUT","path":"/appointments/{id}","summary":"Update / reschedule appointment","description":"","tag":"Appointments","request_body":{"content_type":"application/json"},"query_params":[],"path_params":["id"],"responses":[{"code":"200","description":"Appointment updated"},{"code":"404","description":"Appointment not found"}]},{"method":"DELETE","path":"/appointments/{id}","summary":"Cancel appointment","description":"","tag":"Appointments","request_body":null,"query_params":[],"path_params":["id"],"responses":[{"code":"204","description":"Appointment cancelled"},{"code":"404","description":"Appointment not found"}]}],"tags":["Patients","Tokens","Queue","Appointments"]},{"label":"Clinical","color":"#10b981","port":"3002","description":"Manages clinical sessions (OPD, wound care, channelling), vitals recording, diagnoses,","endpoints":[{"method":"POST","path":"/sessions","summary":"Start a new clinical session","description":"Creates a new session for a patient visit. Returns the session_id used for all\nsubsequent calls (vitals, diagnoses, prescriptions, images, lab requests).\nDoctor ID is taken from the JWT (X-User-Id injected by gateway).","tag":"Sessions","request_body":{"content_type":"application/json","example":"{\n  \"patient_id\": \"a1b2c3d4-e5f6-7890-abcd-ef1234567890\",\n  \"session_type\": \"opd\",\n  \"chief_complaint\": \"Persistent fever for 3 days\"\n}"},"query_params":[],"path_params":[],"responses":[{"code":"201","description":"Session created"},{"code":"404","description":"Patient not found"}]},{"method":"GET","path":"/sessions","summary":"List sessions","description":"Doctor sees only their own sessions. Admin sees all.","tag":"Sessions","request_body":null,"query_params":[{"name":"patient_id","required":false,"description":"","type":"string","enum":null},{"name":"doctor_id","required":false,"description":"","type":"string","enum":null},{"name":"session_type","required":false,"description":"","type":"string","enum":["opd","wound_care","channelling"]},{"name":"status","required":false,"description":"","type":"string","enum":["open","completed"]},{"name":"date","required":false,"description":"","type":"string","enum":null},{"name":"page","required":false,"description":"","type":"integer","enum":null},{"name":"limit","required":false,"description":"","type":"integer","enum":null}],"path_params":[],"responses":[{"code":"200","description":"Session list"}]},{"method":"GET","path":"/sessions/{id}","summary":"Get session by ID","description":"Returns full session including vitals, prescriptions, images, and lab requests.","tag":"Sessions","request_body":null,"query_params":[],"path_params":["id"],"responses":[{"code":"200","description":"Full session detail"},{"code":"404","description":"Session not found"}]},{"method":"PUT","path":"/sessions/{id}","summary":"Update session fields","description":"Update chief complaint, notes, diagnosis text, or follow-up date. Session must be open.","tag":"Sessions","request_body":{"content_type":"application/json","fields":[{"name":"chief_complaint","type":"string","required":false,"description":""},{"name":"diagnosis","type":"string","required":false,"description":""},{"name":"follow_up_date","type":"string","required":false,"description":""},{"name":"notes","type":"string","required":false,"description":""}] let currentSvc = 0;
let currentTag = null;
let searchQuery = '';

const methodColors = {
  GET: {bg:'var(--get-bg)', color:'var(--get)'},
  POST: {bg:'var(--post-bg)', color:'var(--post)'},
  PUT: {bg:'var(--put-bg)', color:'var(--put)'},
  PATCH: {bg:'var(--patch-bg)', color:'var(--patch)'},
  DELETE: {bg:'var(--delete-bg)', color:'var(--delete)'},
};

function methodBadge(method) {
  const mc = methodColors[method] || {bg:'rgba(255,255,255,.08)', color:'#e2e8f0'};
  return `<span class="method-badge" style="background:${mc.bg};color:${mc.color}">${method}</span>`;
}

function buildNav() {
  const nav = document.getElementById('svc-nav');
  nav.innerHTML = SPECS.map((svc, i) => `
    <div>
      <div class="svc-nav-item${i===currentSvc?' active':''}" style="--svc-color:${svc.color}" onclick="selectSvc(${i})">
        <div class="svc-dot" style="background:${svc.color}"></div>
        <span class="svc-nav-label">${svc.label}</span>
        <span class="svc-nav-port">:${svc.port}</span>
      </div>
      ${i===currentSvc ? svc.tags.map(t => {
        const count = svc.endpoints.filter(e=>e.tag===t).length;
        return `<div class="tag-nav"><div class="tag-nav-item${currentTag===t?' active-tag':''}" onclick="selectTag('${t}',event)">
          <span>▸</span> ${t} <span class="tag-count">${count}</span>
        </div></div>`;
      }).join('') : ''}
    </div>
  `).join('');
}

function selectSvc(i) {
  currentSvc = i;
  currentTag = null;
  searchQuery = '';
  document.getElementById('search').value = '';
  buildNav();
  renderMain();
  document.getElementById('main').scrollTo(0,0);
}

function selectTag(tag, e) {
  e.stopPropagation();
  currentTag = currentTag === tag ? null : tag;
  buildNav();
  renderMain();
  // scroll to tag
  setTimeout(() => {
    const el = document.getElementById('tag-' + tag.replace(/[^a-z0-9]/gi,'_'));
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 50);
}

function filterEndpoints(q) {
  searchQuery = q.toLowerCase();
  renderMain();
}

function renderMain() {
  const svc = SPECS[currentSvc];
  
  // Header
  document.getElementById('main-hdr').innerHTML = `
    <div class="main-hdr-top">
      <div>
        <div class="svc-title" style="color:${svc.color}">${svc.label} Service</div>
        <div class="svc-badge" style="color:${svc.color};border-color:${svc.color}40">
          <span>⬡</span> http://localhost:3000/${svc.label.toLowerCase()} (gateway) · localhost:${svc.port} (direct)
        </div>
      </div>
    </div>
    <p class="svc-desc">${svc.description}</p>
    <div class="svc-stats">
      <div class="stat"><div class="stat-val" style="color:${svc.color}">${svc.endpoints.length}</div><div class="stat-lbl">Endpoints</div></div>
      <div class="stat"><div class="stat-val" style="color:${svc.color}">${svc.tags.length}</div><div class="stat-lbl">Tag Groups</div></div>
      <div class="stat"><div class="stat-val" style="color:${svc.color}">${['GET','POST','PUT','PATCH','DELETE'].map(m=>svc.endpoints.filter(e=>e.method===m).length).filter(Boolean).join('·')}</div><div class="stat-lbl">GET·POST·PUT·DELETE</div></div>
    </div>
  `;
  
  // Endpoints
  let filtered = svc.endpoints;
  if(searchQuery) {
    filtered = filtered.filter(e => 
      e.path.toLowerCase().includes(searchQuery) || 
      e.summary.toLowerCase().includes(searchQuery) ||
      e.method.toLowerCase().includes(searchQuery) ||
      e.tag.toLowerCase().includes(searchQuery)
    );
  }
  if(currentTag && !searchQuery) {
    filtered = filtered.filter(e => e.tag === currentTag);
  }
  
  const groupedByTag = {};
  filtered.forEach(ep => {
    (groupedByTag[ep.tag] = groupedByTag[ep.tag] || []).push(ep);
  });
  
  if(filtered.length === 0) {
    document.getElementById('content').innerHTML = `<div class="empty">No endpoints match "${searchQuery}"</div>`;
    return;
  }
  
  const html = Object.entries(groupedByTag).map(([tag, eps]) => `
    <div class="tag-group" id="tag-${tag.replace(/[^a-z0-9]/gi,'_')}">
      <div class="tag-hdr">
        <h3>${tag}</h3>
        <span class="tag-hdr-count">${eps.length} endpoint${eps.length!==1?'s':''}</span>
      </div>
      ${eps.map((ep, ei) => renderEndpoint(ep, tag+ei)).join('')}
    </div>
  `).join('');
  
  document.getElementById('content').innerHTML = html;
}

function renderEndpoint(ep, uid) {
  const mc = methodColors[ep.method] || {bg:'rgba(255,255,255,.08)',color:'#e2e8f0'};
  
  // Request body section
  let rbHtml = '';
  if(ep.request_body) {
    const rb = ep.request_body;
    rbHtml = `<div class="section-lbl">Request Body <span style="color:var(--muted2);text-transform:none;letter-spacing:0">${rb.content_type||''}</span></div>`;
    if(rb.fields && rb.fields.length) {
      rbHtml += `<table class="fields-table">
        <tr><th>Field</th><th>Type</th><th>Required</th><th>Notes</th></tr>
        ${rb.fields.map(f=>`
          <tr>
            <td class="param-name">${f.name}</td>
            <td class="param-type">${f.type}</td>
            <td>${f.required?'<span class="field-required">required</span>':'<span class="field-optional">optional</span>'}</td>
            <td class="param-desc">${f.description||''}</td>
          </tr>`).join('')}
      </table>`;
    } else if(rb.example) {
      rbHtml += `<pre style="background:#0f172a;border:1px solid #1e293b;border-radius:5px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#94a3b8;overflow-x:auto">${escapeHtml(rb.example)}</pre>`;
    }
  }
  
  // Query params
  let qpHtml = '';
  if(ep.query_params && ep.query_params.length) {
    qpHtml = `<div class="section-lbl">Query Parameters</div>
      <table class="params-table">
        <tr><th>Name</th><th>Type</th><th></th><th>Description</th></tr>
        ${ep.query_params.map(p=>`
          <tr>
            <td class="param-name">${p.name}</td>
            <td class="param-type">${p.type}</td>
            <td>${p.required?'<span class="param-req">required</span>':'<span class="param-opt">optional</span>'}</td>
            <td>
              <span class="param-desc">${p.description||''}</span>
              ${p.enum ? `<div class="param-enum">${p.enum.map(v=>`<span class="enum-val">${v}</span>`).join('')}</div>` : ''}
            </td>
          </tr>`).join('')}
      </table>`;
  }
  
  // Path params
  let ppHtml = '';
  if(ep.path_params && ep.path_params.length) {
    ppHtml = `<div class="section-lbl">Path Parameters</div>
      <table class="params-table">
        <tr><th>Name</th><th>Type</th><th></th><th>Description</th></tr>
        ${ep.path_params.map(p=>`
          <tr>
            <td class="param-name">${p}</td>
            <td class="param-type">uuid / string</td>
            <td><span class="param-req">required</span></td>
            <td class="param-desc">URL path parameter</td>
          </tr>`).join('')}
      </table>`;
  }
  
  // Responses
  let respHtml = '';
  if(ep.responses && ep.responses.length) {
    respHtml = `<div class="section-lbl">Responses</div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:8px 12px">
        ${ep.responses.map(r => {
          const cls = r.code.startsWith('2') ? 'code-2xx' : r.code.startsWith('4') ? 'code-4xx' : 'code-5xx';
          return `<div class="response-row">
            <span class="resp-code ${cls}">${r.code}</span>
            <span class="resp-desc">${r.description}</span>
          </div>`;
        }).join('')}
      </div>`;
  }
  
  const svc = SPECS[currentSvc];
  const fullPath = `/api${ep.path}`;
  
  return `
    <div class="ep-card" id="ep-${uid}" style="--ep-color:${svc.color}40">
      <div class="ep-hdr" onclick="toggleEp('ep-${uid}')">
        ${methodBadge(ep.method)}
        <code class="ep-path">${ep.path}</code>
        <span class="ep-summary">${ep.summary}</span>
        <span class="ep-chevron">▾</span>
      </div>
      <div class="ep-body">
        ${ep.description ? `<p class="ep-desc">${ep.description}</p>` : ''}
        ${ppHtml}
        ${qpHtml}
        ${rbHtml}
        ${respHtml}
      </div>
    </div>
  `;
}

function toggleEp(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildNav();
renderMain();
</script>
