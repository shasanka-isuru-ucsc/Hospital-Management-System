server:
    port: 3002

spring:
    application:
        name: clinical-service
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:hms_db}
        username: ${DB_USER:hms_user}
        password: ${DB_PASS:hms_password}
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                format_sql: true
        show-sql: true
    rabbitmq:
        host: localhost
        port: 5672
        username: guest
        password: guest

minio:
    url: http://localhost:9000
    accessKey: minioadmin
    secretKey: minioadmin
    bucketName: hms-scans

queue:
    billing:
        exchange: billing.events
        routing-key:
            opd: billing.opd
            wound: billing.wound
    lab:
        exchange: lab.events
        routing-key:
            request: lab.requested

logging:
    level:
        org:
            hibernate:
                SQL: DEBUG
                orm:
                    jdbc:
                        bind: TRACE
